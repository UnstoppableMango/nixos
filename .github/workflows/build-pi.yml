name: Build Pi

on:
  workflow_dispatch:
    inputs:
      machine:
        description: Machine to build (leave empty for all)
        required: false
        type: string
  push:
    branches: [k8s]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          if [ -n "${{ inputs.machine }}" ]; then
            echo 'matrix=["${{ inputs.machine }}"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["pik8s1","pik8s2","pik8s3","pik8s4","pik8s5","pik8s6"]' >> $GITHUB_OUTPUT
          fi

  build-pi:
    needs: setup
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        machine: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: unstoppablemango
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: nix build .#nixosConfigurations.${{ matrix.machine }}.config.system.build.toplevel
